# fly.toml — DeSo Unstake Bot (background worker, no HTTP service)

app = 'deso-unstake-bot'
primary_region = 'iad'

[build]

# No [http_service] — this is a worker. Removing it prevents auto-stop on idle.

[mounts]
  source = "deso_bot_data"
  destination = "/data"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
